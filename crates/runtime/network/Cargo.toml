[package]
name = "selium-runtime-network"
version.workspace = true
edition.workspace = true
description.workspace = true
readme.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true

[dependencies]
anyhow = { workspace = true }
bytes = { workspace = true, features = ["std"] }
futures-util = { workspace = true, features = ["alloc"] }
http-body-util = { workspace = true }
hyper = { workspace = true, features = ["client", "http1", "server"] }
hyper-util = { workspace = true, features = ["http1", "server", "tokio"] }
quinn = { workspace = true, features = ["platform-verifier", "runtime-tokio", "rustls-ring"] }
rustls = { workspace = true, features = ["ring", "std"] }
rustls-pemfile = { workspace = true, features = ["std"] }
selium-abi = { workspace = true }
selium-control-plane-protocol = { workspace = true }
selium-kernel = { workspace = true, features = ["services"] }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["net", "sync", "time"] }
tokio-rustls = { workspace = true, features = ["ring"] }
tracing = { workspace = true, features = ["attributes"] }
