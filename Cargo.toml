[workspace]
resolver = "2"
members = [
  "crates/abi",
  "crates/kernel",
  "crates/runtime",
  "crates/guest",
  "crates/guest/macros",
  "crates/control-plane/api",
  "crates/control-plane/protocol",
  "crates/control-plane/scheduler",
  "crates/control-plane/runtime",
  "crates/io/consensus",
  "crates/io/tables",
  "crates/runtime-adapters/spi",
  "crates/runtime-adapters/wasmtime-adapter",
  "crates/runtime-adapters/microvm-adapter",
  "crates/io/core",
  "crates/io/durability",
  "crates/sdk/rust",
  "modules/control-plane",
  "modules/io-demo",
  "crates/cli",
]

[workspace.package]
version = "0.1.0-alpha.0"
edition = "2024"
description = "Selium next-generation monorepo"
readme = "README.md"
license = "MPL-2.0"
repository = "https://github.com/seliumlabs/selium"
homepage = "https://selium.com"
keywords = ["selium", "runtime", "wasm", "control-plane"]
categories = ["virtualization", "wasm", "development-tools"]

[workspace.dependencies]
anyhow = { version = "1.0", default-features = false }
blake3 = { version = "1.8", default-features = false }
clap = { version = "4.5", default-features = false }
futures = { version = "0.3", default-features = false }
futures-util = { version = "0.3", default-features = false }
libc = { version = "0.2", default-features = false }
loom = { version = "0.7", default-features = false }
parking_lot = { version = "0.12", default-features = false }
path-security = { version = "0.2", default-features = false }
pin-project = { version = "1.1", default-features = false }
proc-macro-crate = { version = "3.4", default-features = false }
proc-macro2 = { version = "1.0", default-features = false }
quinn = { version = "0.11", default-features = false }
quote = { version = "1.0", default-features = false }
rcgen = { version = "0.14", default-features = false }
rkyv = { version = "0.8", default-features = false }
rustls = { version = "0.23", default-features = false }
rustls-pemfile = { version = "2.2", default-features = false }
rustls-pki-types = { version = "1.14", default-features = false }
sharded-slab = { version = "0.1", default-features = false }
stable-vec = { version = "0.4", default-features = false }
syn = { version = "2.0", default-features = false }
thiserror = { version = "2.0", default-features = false }
tokio = { version = "1.49", default-features = false }
tokio-rustls = { version = "0.26", default-features = false }
tracing = { version = "0.1", default-features = false }
tracing-subscriber = { version = "0.3", default-features = false }
trybuild = { version = "1.0", default-features = false }
uuid = { version = "1.20", default-features = false }
wasmtime = { version = "41.0", default-features = false }
webpki-roots = { version = "1.0", default-features = false }

selium-abi = { path = "crates/abi", version = "0.1.0-alpha.0" }
selium-kernel = { path = "crates/kernel", version = "0.1.0-alpha.0" }
selium-guest = { path = "crates/guest", version = "0.1.0-alpha.0" }

selium-control-plane-api = { path = "crates/control-plane/api", version = "0.1.0-alpha.0" }
selium-control-plane-protocol = { path = "crates/control-plane/protocol", version = "0.1.0-alpha.0" }
selium-control-plane-scheduler = { path = "crates/control-plane/scheduler", version = "0.1.0-alpha.0" }
selium-control-plane-runtime = { path = "crates/control-plane/runtime", version = "0.1.0-alpha.0" }
selium-io-consensus = { path = "crates/io/consensus", version = "0.1.0-alpha.0" }
selium-io-tables = { path = "crates/io/tables", version = "0.1.0-alpha.0" }
selium-runtime-adapter-spi = { path = "crates/runtime-adapters/spi", version = "0.1.0-alpha.0" }
selium-runtime-adapter-wasmtime = { path = "crates/runtime-adapters/wasmtime-adapter", version = "0.1.0-alpha.0" }
selium-runtime-adapter-microvm = { path = "crates/runtime-adapters/microvm-adapter", version = "0.1.0-alpha.0" }
selium-io-core = { path = "crates/io/core", version = "0.1.0-alpha.0" }
selium-io-durability = { path = "crates/io/durability", version = "0.1.0-alpha.0" }
selium-sdk-rust = { path = "crates/sdk/rust", version = "0.1.0-alpha.0" }
selium-module-control-plane = { path = "modules/control-plane", version = "0.1.0-alpha.0" }

[workspace.lints.rust]
unsafe_code = "forbid"
