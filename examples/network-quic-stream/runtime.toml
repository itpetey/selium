[network]

[[network.egress-profiles]]
name = "example-quic-loopback"
protocol = "quic"
interactions = ["stream"]
allowed-authorities = ["127.0.0.1:7400"]
ca-cert = "certs/ca.crt"

[[network.ingress-bindings]]
name = "example-quic-loopback"
protocol = "quic"
interactions = ["stream"]
listen = "127.0.0.1:7400"
cert = "certs/server.crt"
key = "certs/server.key"
